schema_version: 1

context:
  name: db-dtypes
  version: 1.6.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: 4ba87b15cc972a7cc0aed2b7483e0823c7765eca88128453f52c88c5e0f4ae46

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - packaging >=24.2.0
    - pandas >=1.5.3,<3.0.0
    - pyarrow >=13.0.0
tests:
  - python:
      imports:
        - db_dtypes
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: Pandas Data Types for SQL systems (BigQuery, Spanner)
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/googleapis/google-cloud-python/tree/main/packages/db-dtypes
  documentation: https://googleapis.dev/python/db-dtypes/latest/index.html

extra:
  recipe-maintainers:
    - xylar
    - tswast
